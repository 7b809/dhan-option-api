<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Option Chain API Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f4f6f9;
      }

      .route-card {
        transition: 0.2s;
      }

      .route-card:hover {
        transform: scale(1.01);
      }

      .response-box {
        background: #111;
        color: #0f0;
        padding: 15px;
        border-radius: 8px;
        font-family: monospace;
        max-height: 400px;
        overflow: auto;
      }
    </style>
  </head>

  <body>
    <div class="container mt-4">
      <h2 class="mb-3">📊 Option Chain API Dashboard</h2>

      <div class="mb-4">
        <button class="btn btn-primary" onclick="loadRoutes()">
          Load All Routes
        </button>
        <a href="/apidocs" class="btn btn-secondary">Swagger Docs</a>
      </div>

      <div id="routesContainer" class="row g-3"></div>

      <hr class="mt-5" />

      <h4>API Response</h4>
      <div id="responseBox" class="response-box">
        Click a route to see response...
      </div>
    </div>

    <script>
      async function loadRoutes() {
        const res = await fetch("/routes");
        const data = await res.json();

        const container = document.getElementById("routesContainer");
        container.innerHTML = "";

        Object.keys(data).forEach((group) => {
          data[group].forEach((route) => {
            const col = document.createElement("div");
            col.className = "col-md-6";

            col.innerHTML = `
                <div class="card route-card shadow-sm">
                    <div class="card-body">

                        <h6 class="text-muted">${group}</h6>

                        <p style="font-family:monospace;font-size:13px">
                            ${route}
                        </p>

                        <button class="btn btn-primary btn-sm"
                        onclick="copyApi('${route}')">
                        Copy API
                        </button>

                    </div>
                </div>
            `;

            container.appendChild(col);
          });
        });
      }

      async function callApi(route) {
        const responseBox = document.getElementById("responseBox");

        responseBox.innerHTML = "Loading...";

        try {
          const res = await fetch(route);

          const text = await res.text();

          try {
            const json = JSON.stringify(JSON.parse(text), null, 2);
            responseBox.innerHTML = json;
          } catch {
            responseBox.innerHTML = text;
          }
        } catch (err) {
          responseBox.innerHTML = "Error calling API";
        }
      }

      function copyApi(route) {
        const fullUrl = window.location.origin + route;

        navigator.clipboard.writeText(fullUrl).then(() => {
          const responseBox = document.getElementById("responseBox");
          responseBox.innerHTML = "✅ Copied: " + fullUrl;
        }).catch(() => {
          const responseBox = document.getElementById("responseBox");
          responseBox.innerHTML = "❌ Failed to copy";
        });
      }

      loadRoutes();
    </script>
  </body>
</html>
